<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTech CP - Cadastro e Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="cabecalho-simples">
        <h1>EcoTech CP</h1>
        <p>Portal de Reciclagem de Eletrônicos de Cornélio Procópio</p>
    </header>

    <main class="container-auth">
        
        <section class="box-form">
            <h2>Crie sua conta</h2>
            <form action="#" method="POST">
                <div class="campo">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>
                <div class="campo">
                    <label for="email-cad">E-mail:</label>
                    <input type="email" id="email-cad" name="email-cad" required>
                </div>
                <div class="campo">
                    <label for="telefone">Telefone:</label>
                    <input type="tel" id="telefone" name="telefone" required>
                </div>
                <div class="campo">
                    <label for="senha-cad">Senha:</label>
                    <input type="password" id="senha-cad" name="senha-cad" required>
                </div>
                <div class="campo">
                    <label for="conf-senha">Confirme a Senha:</label>
                    <input type="password" id="conf-senha" name="conf-senha" required>
                </div>
                <button type="submit" class="btn">Cadastrar</button>
            </form>
        </section>

        <section class="box-form">
            <h2>Já possui conta? Entre</h2>
            <form action="index.html" method="GET">
                <div class="campo">
                    <label for="email-login">E-mail:</label>
                    <input type="email" id="email-login" name="email-login" required>
                </div>
                <div class="campo">
                    <label for="senha-login">Senha:</label>
                    <input type="password" id="senha-login" name="senha-login" required>
                </div>
                <button type="submit" class="btn btn-secundario">Entrar no Sistema</button>
            </form>
        </section>

    </main>
</body>
</html>
