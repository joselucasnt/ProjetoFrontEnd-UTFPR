<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTech CP - Administração</title>
    
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <header class="cabecalho-principal">
        <div class="logo">
            <h1>EcoTech CP</h1>
        </div>
        <nav>
            <ul class="menu">
                <li><a href="index.html">Início</a></li>
                <li><a href="adm.html" style="color: #1976D2;">Adm</a></li>
            </ul>
        </nav>
    </header>

    <main class="container-auth">
        
        
        <section class="box-form" style="max-width: 500px; width: 100%;">
            <h2>Cadastrar Novo Usuário</h2>
            <form id="form-adm">
                <div class="campo">
                    <label for="nome-adm">Nome do Usuário:</label>
                    <input type="text" id="nome-adm" required>
                </div>
                <div class="campo">
                    <label for="email-adm">E-mail:</label>
                    <input type="email" id="email-adm" required>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button type="submit" class="btn">Cadastrar</button>
                    
                    <button type="button" class="btn btn-secundario" id="btn-limpar">Limpar</button> 
                </div>
            </form>
        </section>

       
        <section class="box-form" style="max-width: 600px; width: 100%;">
            <h2>Usuários Cadastrados</h2>
            
            <div class="campo">
                <label for="pesquisa">Pesquisar:</label>
                
                <input type="text" id="pesquisa" placeholder="Buscar por nome ou e-mail...">
            </div>

            <div style="margin-bottom: 15px;">
                
                <button type="button" class="btn" style="background-color: #d32f2f;" id="btn-excluir-todos">Excluir Todos</button>
            </div>

            
            <ul id="lista-usuarios" style="list-style: none; padding: 0;">
               
            </ul>
        </section>

    </main>

    <footer>
        <div class="creditos">
            <p>Projeto 2 - Programação Web Front-End (JavaScript)</p>
            <p>Equipe EcoTech CP</p>
        </div>
    </footer>

    
    <script src="script.js"></script>
</body>
</html>
